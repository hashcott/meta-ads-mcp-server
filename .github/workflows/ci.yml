name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches-ignore:
      - master

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify binary
        run: |
          echo "test" | timeout 3 node dist/index.js 2>&1 | grep -q "access-token" && echo "Binary OK"
